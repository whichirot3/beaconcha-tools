name: Feature request
description: Propose an improvement with clear operator value.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What operator workflow is blocked or inefficient?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe UX/API/behavior changes.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Objective checks to mark done.
      placeholder: |
        - [ ] ...
        - [ ] ...
