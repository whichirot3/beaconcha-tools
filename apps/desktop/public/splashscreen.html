<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beaconcha Tools Loading</title>
    <style>
      :root {
        color-scheme: light;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'Inter', 'Segoe UI', sans-serif;
        background: #e6e6e3;
      }
      .splash {
        width: 100%;
        height: 100%;
        padding: 14px;
        display: grid;
      }
      .card {
        width: 100%;
        height: 100%;
        border-radius: 10px;
        border: 1px solid #cfd1ca;
        background: #f5f5f1;
        box-shadow: 0 14px 24px rgba(24, 27, 25, 0.12);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 14px;
      }
      .left {
        display: grid;
        align-content: start;
        gap: 8px;
      }
      .logo {
        width: 64px;
        height: 64px;
        border-radius: 8px;
      }
      h1 {
        margin: 0;
        font-size: 1.22rem;
        line-height: 1.2;
        letter-spacing: -0.02em;
        color: #1f2321;
      }
      p {
        margin: 0;
        color: #636962;
        font-size: 0.86rem;
      }
      .meter {
        margin-top: 8px;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: #d4d7d0;
      }
      .meter > i {
        display: block;
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #8a9087, #a4aaa2);
        transition: width 420ms ease;
      }
      .steps {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 7px;
        align-content: center;
      }
      .step {
        border: 1px solid #ced2cb;
        border-radius: 8px;
        background: #f0f2ed;
        padding: 8px;
        display: grid;
        grid-template-columns: 24px 1fr;
        gap: 8px;
        align-items: center;
      }
      .dot {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 1px solid #a2a79f;
        display: grid;
        place-items: center;
        font-size: 0.68rem;
        color: transparent;
        transition: all 220ms ease;
      }
      .step.done .dot {
        background: #2e9a63;
        border-color: #2e9a63;
        color: white;
      }
      .step label {
        font-size: 0.8rem;
        color: #49524a;
      }
      .step.done label {
        color: #23402f;
      }
      .footer {
        margin-top: auto;
        color: #788076;
        font-size: 0.74rem;
      }
    </style>
  </head>
  <body>
    <main class="splash">
      <section class="card">
        <div class="left">
          <img class="logo" src="/icon.png" alt="Beaconcha Tools" />
          <h1>Beaconcha Tools</h1>
          <p>Initializing runtime and preparing validator command center.</p>
          <div class="meter"><i id="bar"></i></div>
          <div class="footer">Loading core modules...</div>
        </div>

        <ul class="steps" id="steps">
          <li class="step"><span class="dot">✓</span><label>Beacon RPC handshake</label></li>
          <li class="step"><span class="dot">✓</span><label>Execution RPC handshake</label></li>
          <li class="step"><span class="dot">✓</span><label>Cache + DB state probe</label></li>
          <li class="step"><span class="dot">✓</span><label>UI runtime warm-up</label></li>
        </ul>
      </section>
    </main>

    <script>
      const steps = Array.from(document.querySelectorAll('.step'));
      const bar = document.getElementById('bar');
      let index = 0;

      function tick() {
        if (index < steps.length) {
          steps[index].classList.add('done');
          bar.style.width = `${Math.round(((index + 1) / steps.length) * 100)}%`;
          index += 1;
          setTimeout(tick, 420);
        }
      }

      setTimeout(tick, 180);
    </script>
  </body>
</html>
